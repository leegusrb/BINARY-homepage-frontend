  <style>
    body {
      font-family: "Space Grotesk", sans-serif;
      background-color: #fcfcfc;
    }

    .glass-card {
      background: #ffffff;
      border: 1px solid #f1f5f9;

<body class="text-slate-900 min-h-screen flex flex-col font-display bg-slate-50">
  <app-header></app-header>
  <main class="flex-1 w-full max-w-[800px] mx-auto px-8 py-16 flex flex-col items-center">
    <div class="glass-card shadow-soft rounded-3xl w-full p-10 md:p-12 animate-fade-in-up">
      <div class="flex items-center gap-4 mb-10 border-b border-slate-100 pb-6">
        <a class="p-2 -ml-2 rounded-full hover:bg-slate-50 text-slate-400 hover:text-slate-900 transition-colors"
          href="javascript:history.back()">
          <span class="material-symbols-outlined block">arrow_back</span>
        </a>
        <div>
          <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Edit Profile</h1>
          <p class="text-slate-500 mt-1">Update your personal information and security settings.</p>
        </div>
      </div>
      <form id="edit-profile-form" class="space-y-8">
        <div class="space-y-6">
          <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">person</span>
            Personal Information
          </h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-1">
              <label class="block text-sm font-medium text-slate-700 mb-2" for="name">이름</label>
              <input
                class="w-full rounded-xl border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 focus:border-primary focus:ring-primary focus:ring-1 transition-shadow duration-200 placeholder:text-slate-400 outline-none"
                id="name" name="name" placeholder="Enter your full name" type="text" />
            </div>
            <div class="col-span-1">
              <label class="block text-sm font-medium text-slate-700 mb-2" for="studentId">학번</label>
              <input
                class="w-full rounded-xl border-slate-200 bg-slate-100 px-4 py-3 text-slate-500 cursor-not-allowed select-none"
                disabled="" id="studentId" name="studentId" readonly="" type="text" />
              <p class="text-xs text-slate-400 mt-1.5 ml-1">학번 변경은 운영진에게 문의해주세요.</p>
            </div>
            <div class="col-span-1 md:col-span-2">
              <label class="block text-sm font-medium text-slate-700 mb-2" for="email">이메일</label>
              <input
                class="w-full rounded-xl border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 focus:border-primary focus:ring-primary focus:ring-1 transition-shadow duration-200 placeholder:text-slate-400 outline-none"
                id="email" name="email" placeholder="yourname@example.com" type="email" />
            </div>
            <div class="col-span-1 md:col-span-2">
              <label class="block text-sm font-medium text-slate-700 mb-2" for="bio">한 줄 소개</label>
              <input
                class="w-full rounded-xl border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 focus:border-primary focus:ring-primary focus:ring-1 transition-shadow duration-200 placeholder:text-slate-400 outline-none"
                id="bio" name="bio" placeholder="Briefly describe yourself" type="text" />
            </div>
            <div class="col-span-1 md:col-span-2">
              <label class="block text-sm font-medium text-slate-700 mb-2" for="baekjoonId">백준 ID</label>
              <div class="relative flex items-center gap-3">
                <div class="relative w-full">
                  <input
                    class="w-full rounded-xl border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 focus:border-primary focus:ring-primary focus:ring-1 transition-shadow duration-200 placeholder:text-slate-400 outline-none pr-12"
                    id="baekjoonId" name="baekjoonId" placeholder="Your BOJ handle" type="text" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="pt-8 flex items-center justify-between border-t border-slate-100 mt-8">
          <button
            class="px-6 py-3 rounded-xl border border-slate-200 text-slate-600 font-bold hover:bg-slate-50 hover:text-slate-900 transition-colors text-sm tracking-wide"

            Cancel
