<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>BINARY - Club Leaderboard</title>

  <link rel="stylesheet" href="/css/global.css" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/js/tailwind-config.js"></script>
  <script src="/js/components.js" defer></script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: "Space Grotesk", sans-serif;
      background: linear-gradient(135deg, #f9fafb 0%, #edf0f2 100%);
      min-height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
    }

    .glass-card-hover:hover {
      background: rgba(255, 255, 255, 0.85);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.08);
      border-color: rgba(16, 185, 129, 0.2);
    }

    .badge-polygon {
      width: 40px;
      height: 48px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .badge-polygon-lg {
      width: 60px;
      height: 72px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    /* 디자인에서 쓰는 색 네이밍(두번째 코드 그대로 쓰려고) */
    .bg-tier-gold { background-color: #f59e0b; }
    .bg-tier-silver { background-color: #64748b; }
    .bg-tier-bronze { background-color: #d97706; }
    .text-tier-gold { color: #b45309; }
    .text-tier-silver { color: #475569; }
    .text-tier-bronze { color: #9a3412; }
    .text-charcoal { color: #0f172a; }
  </style>
</head>

<body class="text-text-main min-h-screen flex flex-col font-body">
  <app-header></app-header>

  <main class="w-full max-w-[1000px] mx-auto px-6 py-12 flex flex-col gap-12">

    <!-- ===== Title ===== -->
    <section class="flex flex-col items-center justify-center text-center gap-3">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/50 border border-white shadow-sm backdrop-blur-sm text-sm font-medium text-slate-500 mb-2">
  <span class="material-symbols-outlined text-lg text-primary">calendar_today</span>
  <span id="current-month"></span>
</div>
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900">
  Monthly Rankings
</h1>
<p class="h-6"></p>
    </section>

    <!-- ===== Podium ===== -->
    <section class="w-full relative z-10">
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[300px] bg-primary/5 rounded-full blur-3xl -z-10"></div>

      <div class="flex flex-col md:flex-row items-end justify-center gap-6 pb-8">

        <!-- 2등 -->
        <div class="order-2 md:order-1 flex-1 flex flex-col items-center w-full max-w-[280px]">
          <div class="glass-card w-full rounded-2xl p-6 flex flex-col items-center relative group transition-all duration-300 hover:shadow-premium hover:-translate-y-2">
            <div class="absolute -top-6">
              <div class="w-12 h-12 bg-white rounded-xl shadow-lg flex items-center justify-center border border-slate-100 rotate-3 group-hover:rotate-6 transition-transform">
                <span class="font-bold text-slate-400 text-xl podium-rank">#2</span>
              </div>
            </div>

            <div class="mt-8 mb-2 flex flex-col items-center gap-2">
              <div class="relative w-16 h-16 flex items-center justify-center">
                <div id="p2-badge" class="badge-polygon w-14 h-16 shadow-lg flex items-center justify-center">
  <span id="p2-rank" class="text-white font-black text-lg drop-shadow-md">II</span>
</div>
              </div>
              <span id="p2-tier" class="text-xs font-bold text-tier-gold uppercase tracking-wider mt-1">Gold II</span>
            </div>

            <div class="text-center mb-6">
              <h3 id="p2-name" class="text-xl font-bold text-charcoal">—</h3>
            </div>

            <div class="w-full pt-4 border-t border-slate-200/50 flex flex-col gap-3">
              <div class="flex items-center justify-between px-2">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Attend</span>
                <div class="flex items-baseline gap-1">
                  <span id="p2-attend" class="text-lg font-bold text-slate-800">0</span>
                  <span id="p2-total" class="text-xs text-slate-400">/0</span>
                </div>
              </div>

              <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div id="p2-bar" class="h-full bg-tier-gold rounded-full" style="width: 0%"></div>
              </div>

              <div class="flex items-center justify-between px-2 mt-1">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Streak</span>
                <div class="flex items-center gap-1">
                  <span class="material-symbols-outlined text-sm text-orange-500">local_fire_department</span>
                  <span id="p2-streak" class="text-base font-bold text-slate-800">—</span>
                </div>
              </div>
            </div>
          </div>

          <div class="hidden md:block w-[80%] h-4 bg-gradient-to-b from-slate-200/30 to-transparent rounded-b-xl mx-auto blur-sm"></div>
        </div>

        <!-- 1등 -->
        <div class="order-1 md:order-2 flex-1 w-full max-w-[320px] z-20">
          <div class="glass-card w-full rounded-2xl p-8 flex flex-col items-center relative border-primary/20 shadow-glow transform md:-translate-y-8 group transition-all duration-300">
            <div class="absolute -top-6">
  <div class="w-14 h-14 bg-white rounded-xl shadow-lg flex items-center justify-center border border-slate-100 transition-transform group-hover:rotate-3">
    <span class="font-black text-[#C9A227] text-xl">#1</span>
  </div>
</div>

            <div class="mt-12 mb-3 flex flex-col items-center gap-2">
              <div class="relative w-20 h-20 flex items-center justify-center">
                <div id="p1-badge" class="badge-polygon badge-polygon-lg shadow-xl flex items-center justify-center">
  <span id="p1-rank" class="text-white font-black text-2xl drop-shadow-md">I</span>
</div>
                <div class="absolute -top-1 -right-1">
  <span id="p1-star"
    class="material-symbols-outlined text-cyan-400 drop-shadow-sm text-2xl bg-white rounded-full p-0.5"
    style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
              </div>
             <span id="p1-tier" class="text-sm font-black uppercase tracking-widest mt-1">Diamond I</span>
            </div>

            <div class="text-center mb-6">
              <h3 id="p1-name" class="text-2xl font-black text-charcoal tracking-tight">—</h3>
            </div>

            <div class="w-full pt-5 border-t border-slate-200/50 flex flex-col gap-4">
              <div class="flex items-center justify-between px-2">
                <span class="text-xs font-bold text-primary uppercase tracking-wider">Attendance</span>
                <div class="flex items-baseline gap-1">
                  <span id="p1-attend" class="text-2xl font-black text-slate-900">0</span>
                  <span id="p1-total" class="text-sm text-slate-400">/0</span>
                </div>
              </div>

              <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                <div id="p1-bar" class="h-full bg-primary rounded-full shadow-[0_0_10px_rgba(16,185,129,0.5)]" style="width: 0%"></div>
              </div>

              <div class="flex items-center justify-between px-2 bg-slate-50 rounded-lg py-2 mt-1">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Active Streak</span>
                <div class="flex items-center gap-1.5">
                  <span class="material-symbols-outlined text-lg text-orange-500 animate-pulse">local_fire_department</span>
                  <span id="p1-streak" class="text-lg font-black text-charcoal">—</span>
                </div>
              </div>
            </div>
          </div>

          <div class="hidden md:block w-[85%] h-6 bg-gradient-to-b from-primary/10 to-transparent rounded-b-xl mx-auto blur-md"></div>
        </div>

        <!-- 3등 -->
        <div class="order-3 md:order-3 flex-1 flex flex-col items-center w-full max-w-[280px]">
          <div class="glass-card w-full rounded-2xl p-6 flex flex-col items-center relative group transition-all duration-300 hover:shadow-premium hover:-translate-y-2">
            <div class="absolute -top-6">
              <div class="w-12 h-12 bg-white rounded-xl shadow-lg flex items-center justify-center border border-slate-100 -rotate-3 group-hover:-rotate-6 transition-transform">
                <span class="font-bold text-[#CD7F32] text-xl podium-rank">#3</span>
              </div>
            </div>

            <div class="mt-8 mb-2 flex flex-col items-center gap-2">
              <div class="relative w-16 h-16 flex items-center justify-center">
               <div id="p3-badge" class="badge-polygon w-14 h-16 shadow-lg flex items-center justify-center">
  <span id="p3-rank" class="text-white font-black text-lg drop-shadow-md">III</span>
</div>
              </div>
              <span id="p3-tier" class="text-xs font-bold text-tier-silver uppercase tracking-wider mt-1">Silver III</span>
            </div>

            <div class="text-center mb-6">
              <h3 id="p3-name" class="text-xl font-bold text-charcoal">—</h3>
            </div>

            <div class="w-full pt-4 border-t border-slate-200/50 flex flex-col gap-3">
              <div class="flex items-center justify-between px-2">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Attend</span>
                <div class="flex items-baseline gap-1">
                  <span id="p3-attend" class="text-lg font-bold text-slate-800">0</span>
                  <span id="p3-total" class="text-xs text-slate-400">/0</span>
                </div>
              </div>

              <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div id="p3-bar" class="h-full bg-tier-silver rounded-full" style="width: 0%"></div>
              </div>

              <div class="flex items-center justify-between px-2 mt-1">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Streak</span>
                <div class="flex items-center gap-1">
                  <span class="material-symbols-outlined text-sm text-orange-500">local_fire_department</span>
                  <span id="p3-streak" class="text-base font-bold text-slate-800">—</span>
                </div>
              </div>
            </div>
          </div>

          <div class="hidden md:block w-[80%] h-4 bg-gradient-to-b from-slate-200/30 to-transparent rounded-b-xl mx-auto blur-sm"></div>
        </div>

      </div>
    </section>

    <!-- ===== List Header + Cards ===== -->
    <section class="w-full flex flex-col gap-4">
      <div class="hidden md:grid grid-cols-12 gap-4 px-6 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">
        <div class="col-span-1 text-center">Rank</div>
        <div class="col-span-3 text-left pl-2">Member</div>
        <div class="col-span-2 text-center">Tier</div>
        <div class="col-span-3 text-center">Attendance</div>
        <div class="col-span-3 text-center">Streak</div>
      </div>

      <!-- JS가 여기에 카드들을 꽂음 -->
      <div id="rank-list" class="flex flex-col gap-4"></div>

      <div class="flex justify-center mt-2">
        <button id="btn-more" class="group relative px-8 py-3 rounded-full bg-white border border-slate-200 shadow-sm hover:shadow-md hover:border-primary/50 transition-all">
          <span class="text-sm font-bold text-slate-600 group-hover:text-primary flex items-center gap-2">
            <span id="more-text">Show more members</span>
            <span id="more-icon" class="material-symbols-outlined text-lg group-hover:translate-y-0.5 transition-transform">expand_more</span>
          </span>
        </button>
      </div>
    </section>

  </main>

  <app-footer></app-footer>

  <script src="../js/ranking.js"></script>
  <script>
    RankingPage.init();
  </script>
</body>
</html>
