<!DOCTYPE html>
<html class="light" lang="ko">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>BINARY Refined Post Editor</title>
  <link rel="stylesheet" href="/css/global.css" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/js/tailwind-config.js"></script>
  <script src="/js/component.js"></script>
  <style type="text/tailwindcss">
    .formatting-btn {
            @apply p-2 text-gray-400 hover:text-gray-900 hover:bg-gray-50 rounded transition-all duration-200 flex items-center justify-center;
        }
        .formatting-btn.active {
            @apply text-gray-900 bg-gray-100;
        }
        .separator {
            @apply w-px h-5 bg-gray-200 mx-1.5;
        }
        .editor-container {
            @apply max-w-3xl mx-auto w-full h-full flex flex-col;
        }textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #f3f4f6;
            border-radius: 20px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background-color: #e5e7eb;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
    </style>
</head>

<body
  class="bg-background-light font-sans text-slate-900 antialiased min-h-screen flex flex-col overflow-hidden selection:bg-gray-200">
  <app-header></app-header>
  <main class="flex-grow flex bg-[#fafafa] overflow-hidden relative w-full h-full justify-center">
    <div class="w-full h-full flex flex-col items-center overflow-y-auto pt-10 pb-20 px-4">
      <div
        class="bg-white w-full max-w-[800px] min-h-[80vh] shadow-paper rounded-sm p-12 md:p-16 flex flex-col transition-all">
        <input autofocus=""
          class="w-full text-4xl md:text-5xl font-bold text-gray-900 placeholder:text-gray-200 border-none focus:ring-0 focus:outline-none p-0 mb-6 bg-transparent tracking-tight font-sans"
          placeholder="Title" type="text" />
        <div class="w-full h-px bg-gray-100 mb-8"></div>
        <textarea
          class="w-full flex-grow resize-none text-lg md:text-xl text-gray-700 font-serif placeholder:text-gray-300/80 placeholder:font-sans border-none focus:ring-0 focus:outline-none p-0 bg-transparent leading-relaxed"
          placeholder="Start your story..."></textarea>
      </div>
      <div class="mt-8 text-xs text-gray-400 font-sans">
        Type / for commands
      </div>
    </div>
  </main>
  <div
    class="bg-white/95 backdrop-blur border-t border-border-subtle py-3 px-6 flex justify-around items-center md:hidden fixed bottom-0 w-full z-40 safe-area-pb">
    <button class="formatting-btn active"><span class="material-symbols-outlined">format_bold</span></button>
    <button class="formatting-btn"><span class="material-symbols-outlined">format_italic</span></button>
    <button class="formatting-btn"><span class="material-symbols-outlined">add_photo_alternate</span></button>
    <button class="formatting-btn"><span class="material-symbols-outlined">format_list_bulleted</span></button>
    <button class="formatting-btn"><span class="material-symbols-outlined">keyboard_hide</span></button>
  </div>
  <app-footer></app-footer>
</body>

</html>
