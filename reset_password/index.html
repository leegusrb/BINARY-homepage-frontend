<!DOCTYPE html>
<html class="light" lang="ko">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>BINARY - Reset Password</title>
  <link rel="stylesheet" href="/css/global.css" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/js/tailwind-config.js"></script>
  <script src="/js/components.js" defer></script>
</head>

<body class="min-h-screen flex flex-col selection:bg-primary selection:text-white overflow-x-hidden bg-white">
  <app-header></app-header>
  <main class="flex-grow flex items-center justify-center py-10 px-4 md:px-6 bg-white">
    <div class="w-full max-w-[480px] flex flex-col bg-white rounded-xl p-6 md:p-10 shadow-sm border border-gray-200">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary/10 text-primary mb-4">
          <span class="material-symbols-outlined text-[28px]">lock_reset</span>
        </div>
        <h1 class="text-black text-2xl md:text-[28px] font-bold leading-tight tracking-[-0.015em] mb-3 font-sans">
          Reset Password
        </h1>
        <p class="text-gray-600 text-sm md:text-base font-normal leading-relaxed font-sans">
          Enter your email address to reset your password.
        </p>
      </div>
      <form action="#" class="flex flex-col gap-5" method="POST">
        <div class="flex flex-col gap-2">
          <label class="text-black text-sm font-bold leading-normal font-sans" for="email">
            Email Address
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-gray-400 text-[20px]">mail</span>
            </div>
            <input
              class="form-input w-full rounded-lg text-black focus:outline-0 focus:ring-2 focus:ring-primary/50 focus:border-primary border border-gray-200 bg-white h-12 pl-11 pr-4 placeholder:text-gray-400 text-base font-normal transition-all font-sans"
              id="email" name="email" placeholder="student@university.edu" required="" type="email" />
          </div>
        </div>
        <button
          class="w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary hover:bg-primary-hover active:scale-[0.98] transition-all text-white text-base font-bold leading-normal tracking-[0.015em] shadow-md shadow-primary/20 mt-2 font-sans"
          type="submit">
          Send Reset Link
        </button>
      </form>
      <div class="mt-8 text-center pt-6 border-t border-gray-100">
        <a class="inline-flex items-center gap-2 text-black hover:text-primary transition-colors text-sm font-medium group font-sans"
          href="/login">
          <span
            class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
          Back to Login
        </a>
      </div>
    </div>
  </main>

  <app-footer></app-footer>
</body>

</html>
